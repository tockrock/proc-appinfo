name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Package
        run: |
          tar -czf proc-appinfo.tar.gz \
            -C .build/apple/Products/Release \
            proc-appinfo

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" proc-appinfo.tar.gz --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          SHA256=$(shasum -a 256 proc-appinfo.tar.gz | awk '{print $1}')
          URL="https://github.com/tockrock/proc-appinfo/releases/download/${GITHUB_REF_NAME}/proc-appinfo.tar.gz"

          RESPONSE=$(gh api repos/tockrock/homebrew-tap/contents/Formula/proc-appinfo.rb)
          FILE_SHA=$(echo "${RESPONSE}" | jq -r '.sha')
          CURRENT=$(echo "${RESPONSE}" | jq -r '.content' | base64 -d)

          UPDATED=$(echo "${CURRENT}" \
            | sed "s|url \".*\"|url \"${URL}\"|" \
            | sed "s|sha256 \".*\"|sha256 \"${SHA256}\"|")

          gh api repos/tockrock/homebrew-tap/contents/Formula/proc-appinfo.rb \
            --method PUT \
            --field message="proc-appinfo ${GITHUB_REF_NAME}" \
            --field sha="${FILE_SHA}" \
            --raw-field content="$(printf '%s' "${UPDATED}" | base64)"
