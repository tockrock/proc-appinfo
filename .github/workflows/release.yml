name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Package
        run: |
          tar -czf terminal-bundleid.tar.gz \
            -C .build/apple/Products/Release \
            terminal-bundleid

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" terminal-bundleid.tar.gz --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
