name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Package
        run: |
          tar -czf terminal-bundleid.tar.gz \
            -C .build/apple/Products/Release \
            terminal-bundleid

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: terminal-bundleid.tar.gz

      - name: Update Homebrew formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: terminal-bundleid
          tap-repo: tockrock/homebrew-tap
          download-url: https://github.com/tockrock/terminal-bundleid/releases/download/${{ github.ref_name }}/terminal-bundleid.tar.gz
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
